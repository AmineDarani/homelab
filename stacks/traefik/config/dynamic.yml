# =============================================================================
# Traefik dynamic configuration (TLS, middlewares)
# https://doc.traefik.io/traefik/reference/dynamic-configuration/
# =============================================================================

http:
  middlewares:
    # Authentik forward-auth: delegate auth to Authentik (used after Phase 2)
    authentik:
      forwardAuth:
        address: "http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders:
          - "X-authentik-username"
          - "X-authentik-groups"
          - "X-authentik-email"
          - "X-authentik-name"
          - "X-authentik-uid"
    # Rate limiting example (optional)
    rate-limit:
      rateLimit:
        average: 100
        burst: 50

  tls:
    options:
      default:
        minVersion: VersionTLS12
        cipherSuites:
          - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
          - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
          - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
          - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
